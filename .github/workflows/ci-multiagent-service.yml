name: CI - Multiagent Service

on:
  push:
    branches: [master, develop]
    paths:
      - 'backend/multiagent-service/**'
  pull_request:
    branches: [master, develop]
    paths:
      - 'backend/multiagent-service/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/multiagent-service

    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg14
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: traffic_data
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d traffic_data"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://admin:secret@localhost:5432/traffic_data
          REDIS_URL: redis://localhost:6379
        run: uv run pytest tests/ -v
