name: CI - Multiagent Service

on:
  push:
    branches: [master, develop]
    paths:
      - 'backend/multiagent-service/**'
  pull_request:
    branches: [master, develop]
    paths:
      - 'backend/multiagent-service/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/multiagent-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest tests/ -v
