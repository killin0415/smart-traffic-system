server {
    listen 80;
    server_name _;

    # SPA static assets.
    root /usr/share/nginx/html;
    index index.html;

    # Hot-cache the fingerprinted JS/CSS.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Reverse-proxy /api/* → main-service (Spring Boot in the compose network).
    location /api/ {
        proxy_pass         http://main-service:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # main-service's 30 s correlation-bridge timeout dominates; allow head-
        # room for the response to land before nginx gives up.
        proxy_connect_timeout  10s;
        proxy_send_timeout     35s;
        proxy_read_timeout     35s;
    }

    # SPA fallback for client-side routing (none today, but cheap insurance).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
